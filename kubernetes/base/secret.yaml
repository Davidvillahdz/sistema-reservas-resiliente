apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: reservas-app
type: Opaque
stringData:
  POSTGRES_DB: reservas_db
  POSTGRES_USER: reservas_user
  POSTGRES_PASSWORD: reservas_password
  DATABASE_URL: postgresql://reservas_user:reservas_password@postgres-service:5432/reservas_db