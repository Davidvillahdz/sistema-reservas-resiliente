apiVersion: v1
data:
  init.sql: "CREATE TABLE IF NOT EXISTS reservations (\r\n    id UUID PRIMARY KEY,\r\n
    \   customer_name VARCHAR(100) NOT NULL,\r\n    customer_email VARCHAR(150) NOT
    NULL,\r\n    event_id INTEGER NOT NULL,\r\n    quantity INTEGER NOT NULL CHECK
    (quantity > 0),\r\n    status VARCHAR(30) NOT NULL,\r\n    created_at TIMESTAMPTZ
    NOT NULL DEFAULT CURRENT_TIMESTAMP\r\n);\r\n\r\nCREATE INDEX IF NOT EXISTS idx_reservations_event_id\r\nON
    reservations(event_id);\r\n\r\nCREATE INDEX IF NOT EXISTS idx_reservations_customer_email\r\nON
    reservations(customer_email);"
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: reservas-app
