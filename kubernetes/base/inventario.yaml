apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventario
  namespace: reservas-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventario
  template:
    metadata:
      labels:
        app: inventario
    spec:
      containers:
      - name: inventario
        image: sistema-reservas-resiliente-inventario:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: inventario-service
  namespace: reservas-app
spec:
  selector:
    app: inventario
  ports:
  - port: 8002
    targetPort: 8002